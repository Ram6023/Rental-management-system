<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <section class="dashboard-section">
            <div class="container">
                <h1 class="mb-4" style="font-family:var(--font-display);font-weight:800;font-size:1.8rem;"><i class="bi bi-credit-card text-primary"></i> Payment History</h1>
                <div class="row g-4 mb-4" id="paymentStats"></div>
                <div class="table-container" id="paymentsTable"><div class="loading-spinner"><div class="spinner-border" role="status"></div></div></div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        initPage({
            auth: true,
            onReady: async (profile) => {
                const user = await getUser();
                let query = sb.from('payments').select('*, properties(title)').order('created_at', { ascending: false });
                if (profile.role !== 'admin') query = query.eq('user_id', user.id);
                const { data: payments } = await query;
                const list = payments || [];

                const totalPaid = list.filter(p => p.status === 'paid').reduce((s, p) => s + Number(p.amount), 0);
                const totalPending = list.filter(p => p.status === 'pending').reduce((s, p) => s + Number(p.amount), 0);

                document.getElementById('paymentStats').innerHTML = `
                    <div class="col-md-4"><div class="stat-card payments"><div class="stat-label">Total Payments</div><div class="stat-value">${list.length}</div></div></div>
                    <div class="col-md-4"><div class="stat-card properties"><div class="stat-label">Total Paid</div><div class="stat-value">${formatPrice(totalPaid)}</div></div></div>
                    <div class="col-md-4"><div class="stat-card revenue"><div class="stat-label">Pending</div><div class="stat-value">${formatPrice(totalPending)}</div></div></div>`;

                if (!list.length) {
                    document.getElementById('paymentsTable').innerHTML = '<div class="empty-state"><i class="bi bi-receipt"></i><h4>No Payments Found</h4><p>Payment records will appear here</p></div>';
                    return;
                }

                document.getElementById('paymentsTable').innerHTML = `<div class="table-responsive"><table class="table"><thead><tr><th>#</th><th>Property</th><th>Amount</th><th>Status</th><th>Date</th><th>Receipt</th></tr></thead><tbody>${list.map((p, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${escHtml(p.properties?.title || 'N/A')}</td>
                        <td><strong>${formatPrice(p.amount)}</strong></td>
                        <td><span class="badge badge-${p.status}"><i class="bi bi-${p.status === 'paid' ? 'check-circle' : 'clock'}"></i> ${capitalize(p.status)}</span></td>
                        <td>${p.payment_date ? new Date(p.payment_date).toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' }) : '—'}</td>
                        <td>${p.receipt_number ? `<span class="badge bg-light text-dark">${p.receipt_number}</span>` : '—'}</td>
                    </tr>`).join('')}</tbody></table></div>`;
            }
        });
    </script>
</body>
</html>
