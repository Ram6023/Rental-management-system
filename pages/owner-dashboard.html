<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <section class="dashboard-section">
            <div class="container">
                <h1 class="mb-4" style="font-family:var(--font-display);font-weight:800;font-size:1.8rem;">
                    <i class="bi bi-speedometer2 text-primary"></i> Owner Dashboard
                </h1>

                <div class="row g-4 mb-4" id="statsRow">
                    <div class="col-lg-3 col-md-6"><div class="stat-card properties"><div class="stat-label">My Properties</div><div class="stat-value" id="statProperties">0</div></div></div>
                    <div class="col-lg-3 col-md-6"><div class="stat-card users"><div class="stat-label">Available</div><div class="stat-value" id="statAvailable">0</div></div></div>
                    <div class="col-lg-3 col-md-6"><div class="stat-card payments"><div class="stat-label">Messages</div><div class="stat-value" id="statMessages">0</div></div></div>
                    <div class="col-lg-3 col-md-6"><div class="stat-card revenue"><div class="stat-label">Monthly Revenue</div><div class="stat-value" id="statRevenue">₹0</div></div></div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-lg-5"><div class="chart-card"><h5><i class="bi bi-pie-chart"></i> Property Status</h5><canvas id="statusChart" height="250"></canvas></div></div>
                    <div class="col-lg-7"><div class="chart-card"><h5><i class="bi bi-bar-chart"></i> Properties by BHK</h5><canvas id="bhkChart" height="250"></canvas></div></div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0"><i class="bi bi-buildings"></i> My Properties</h5>
                    <a href="add-property.html" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle"></i> Add Property</a>
                </div>
                <div class="table-container">
                    <div class="table-responsive">
                        <table class="table" id="propertiesTable">
                            <thead><tr><th>#</th><th>Title</th><th>Location</th><th>Price</th><th>BHK</th><th>Status</th><th>Actions</th></tr></thead>
                            <tbody id="propertiesBody"><tr><td colspan="7" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        initPage({
            auth: true, role: 'owner',
            onReady: async (profile) => {
                const user = await getUser();

                // Fetch data
                const { data: props } = await sb.from('properties').select('*').eq('owner_id', user.id).order('created_at', { ascending: false });
                const { data: msgs } = await sb.from('messages').select('id').eq('receiver_id', user.id);
                const { data: payments } = await sb.from('payments').select('amount,status').eq('user_id', user.id);

                const properties = props || [];
                const available = properties.filter(p => p.status === 'available').length;
                const rented = properties.filter(p => p.status === 'rented').length;
                const maintenance = properties.filter(p => p.status === 'maintenance').length;
                const revenue = (payments || []).filter(p => p.status === 'paid').reduce((s, p) => s + Number(p.amount), 0);

                document.getElementById('statProperties').textContent = properties.length;
                document.getElementById('statAvailable').textContent = available;
                document.getElementById('statMessages').textContent = (msgs || []).length;
                document.getElementById('statRevenue').textContent = formatPrice(revenue);

                // Status Chart
                new Chart(document.getElementById('statusChart'), {
                    type: 'doughnut',
                    data: { labels: ['Available', 'Rented', 'Maintenance'], datasets: [{ data: [available, rented, maintenance], backgroundColor: ['#10b981', '#f59e0b', '#6366f1'], borderWidth: 0, hoverOffset: 10 }] },
                    options: { responsive: true, cutout: '60%', plugins: { legend: { position: 'bottom', labels: { padding: 20, font: { family: 'Plus Jakarta Sans' } } } } }
                });

                // BHK Chart
                const bhkCounts = {};
                properties.forEach(p => { bhkCounts[p.bhk] = (bhkCounts[p.bhk] || 0) + 1; });
                const sortedBHK = Object.keys(bhkCounts).sort();
                new Chart(document.getElementById('bhkChart'), {
                    type: 'bar',
                    data: { labels: sortedBHK.map(k => k + ' BHK'), datasets: [{ label: 'Properties', data: sortedBHK.map(k => bhkCounts[k]), backgroundColor: ['#818cf8', '#6366f1', '#4f46e5', '#4338ca', '#3730a3'], borderRadius: 8, barThickness: 50 }] },
                    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.05)' } }, x: { grid: { display: false } } } }
                });

                // Table
                const tbody = document.getElementById('propertiesBody');
                if (!properties.length) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4"><div class="empty-state"><i class="bi bi-house-add"></i><h5>No Properties</h5><a href="add-property.html" class="btn btn-primary btn-sm mt-2">Add Your First</a></div></td></tr>';
                } else {
                    tbody.innerHTML = properties.map((p, i) => `
                        <tr id="prop-${p.id}">
                            <td>${i + 1}</td>
                            <td><a href="property-detail.html?id=${p.id}" class="text-primary text-decoration-none fw-semibold">${escHtml(p.title)}</a></td>
                            <td>${escHtml(p.location)}</td>
                            <td><strong>${formatPrice(p.price)}</strong></td>
                            <td>${p.bhk} BHK</td>
                            <td><span class="badge badge-${p.status === 'available' ? 'paid' : 'pending'}">${capitalize(p.status)}</span></td>
                            <td>
                                <a href="edit-property.html?id=${p.id}" class="btn btn-outline-primary btn-sm me-1" title="Edit"><i class="bi bi-pencil"></i></a>
                                <button class="btn btn-outline-danger btn-sm" onclick="confirmDeleteProperty(${p.id}, '${escHtml(p.title)}')" title="Delete"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>`).join('');
                }
            }
        });
    </script>
</body>
</html>
