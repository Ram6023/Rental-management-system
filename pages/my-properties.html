<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Properties | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <section class="dashboard-section">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 style="font-family:var(--font-display);font-weight:800;font-size:1.8rem;"><i class="bi bi-buildings text-primary"></i> My Properties</h1>
                    <a href="add-property.html" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Add Property</a>
                </div>
                <div class="row g-4" id="myPropertiesGrid">
                    <div class="loading-spinner"><div class="spinner-border" role="status"></div></div>
                </div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        initPage({
            auth: true, role: 'owner',
            onReady: async () => {
                const user = await getUser();
                const { data: properties } = await sb.from('properties').select('*').eq('owner_id', user.id).order('created_at', { ascending: false });
                const container = document.getElementById('myPropertiesGrid');

                if (!properties?.length) {
                    container.innerHTML = '<div class="empty-state"><i class="bi bi-house-add"></i><h4>No Properties Listed</h4><p>Start listing your properties to reach tenants</p><a href="add-property.html" class="btn btn-primary mt-2"><i class="bi bi-plus-circle"></i> Add Your First Property</a></div>';
                    return;
                }

                container.innerHTML = properties.map(p => {
                    const imgSrc = p.image_url || 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=400&h=300&fit=crop';
                    return `
                    <div class="col-lg-4 col-md-6" id="prop-${p.id}">
                        <div class="property-card">
                            <div class="card-img-wrapper">
                                <img src="${imgSrc}" alt="${escHtml(p.title)}" loading="lazy"
                                     onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'property-img-placeholder\\'><i class=\\'bi bi-image\\'></i></div>'">
                                <div class="card-badges">
                                    ${p.is_featured ? '<span class="badge badge-featured"><i class="bi bi-star-fill"></i> Featured</span>' : ''}
                                    <span class="badge badge-${p.status === 'available' ? 'available' : 'rented'}">${capitalize(p.status)}</span>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="card-price">${formatPrice(p.price)} <span>/month</span></div>
                                <h5 class="card-title-text">${escHtml(p.title)}</h5>
                                <div class="card-location"><i class="bi bi-geo-alt-fill"></i> ${escHtml(p.location)}</div>
                                <div class="card-features"><div class="feature-item"><i class="bi bi-house-door"></i> ${p.bhk} BHK</div></div>
                                <div class="card-actions">
                                    <a href="edit-property.html?id=${p.id}" class="btn btn-outline-primary btn-sm"><i class="bi bi-pencil"></i> Edit</a>
                                    <button class="btn btn-outline-danger btn-sm" onclick="confirmDeleteProperty(${p.id}, '${escHtml(p.title)}')"><i class="bi bi-trash"></i> Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }
        });
    </script>
</body>
</html>
