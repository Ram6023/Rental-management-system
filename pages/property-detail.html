<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <section class="dashboard-section">
            <div class="container" id="propertyContent">
                <div class="loading-spinner"><div class="spinner-border" role="status"></div></div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        initPage({
            onReady: async (profile) => {
                const id = getUrlParam('id');
                if (!id) { window.location.href = 'properties.html'; return; }

                const { data: p, error } = await sb.from('properties').select('*, profiles!properties_owner_id_fkey(id,name,phone,role)').eq('id', id).single();
                if (error || !p) { 
                    document.getElementById('propertyContent').innerHTML = '<div class="empty-state"><i class="bi bi-house-exclamation"></i><h4>Property Not Found</h4><a href="properties.html" class="btn btn-primary mt-2">Browse Properties</a></div>'; 
                    return; 
                }

                const owner = p.profiles || {};
                const imgSrc = p.image_url || 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&h=500&fit=crop';
                const user = await getUser();

                let isWishlisted = false;
                if (user) {
                    const { data: wl } = await sb.from('wishlist').select('id').eq('user_id', user.id).eq('property_id', p.id);
                    isWishlisted = wl && wl.length > 0;
                }

                document.title = `${p.title} | RentEase`;
                document.getElementById('propertyContent').innerHTML = `
                    <nav aria-label="breadcrumb" class="mb-3">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="home.html" class="text-primary text-decoration-none">Home</a></li>
                            <li class="breadcrumb-item"><a href="properties.html" class="text-primary text-decoration-none">Properties</a></li>
                            <li class="breadcrumb-item active">${escHtml(p.title)}</li>
                        </ol>
                    </nav>
                    <div class="row g-4">
                        <div class="col-lg-7">
                            <div style="position:relative;">
                                <img src="${imgSrc}" alt="${escHtml(p.title)}" class="w-100 rounded-4" style="max-height:450px;object-fit:cover;"
                                     onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&h=500&fit=crop'">
                                <div class="card-badges" style="position:absolute;top:16px;left:16px;">
                                    ${p.is_featured ? '<span class="badge badge-featured"><i class="bi bi-star-fill"></i> Featured</span>' : ''}
                                    <span class="badge badge-${p.status === 'available' ? 'available' : 'rented'}">${capitalize(p.status)}</span>
                                </div>
                                ${user ? `<button class="wishlist-btn ${isWishlisted ? 'active' : ''}" onclick="toggleWishlist('${p.id}',this)" style="position:absolute;top:16px;right:16px;"><i class="bi bi-heart${isWishlisted ? '-fill' : ''}"></i></button>` : ''}
                            </div>
                        </div>
                        <div class="col-lg-5">
                            <div class="chart-card h-100">
                                <div class="card-price mb-2" style="font-size:1.8rem;">${formatPrice(p.price)} <span>/month</span></div>
                                <h1 style="font-size:1.5rem;font-weight:700;">${escHtml(p.title)}</h1>
                                <div class="card-location mb-3"><i class="bi bi-geo-alt-fill text-primary"></i> ${escHtml(p.location)}</div>
                                <hr>
                                <div class="row g-3 text-center mb-3">
                                    <div class="col-4"><div class="p-2 rounded-3" style="background:var(--bg-secondary);"><i class="bi bi-house-door text-primary d-block" style="font-size:1.3rem;"></i><strong>${p.bhk} BHK</strong></div></div>
                                    <div class="col-4"><div class="p-2 rounded-3" style="background:var(--bg-secondary);"><i class="bi bi-calendar text-primary d-block" style="font-size:1.3rem;"></i><strong>${new Date(p.created_at).toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</strong></div></div>
                                    <div class="col-4"><div class="p-2 rounded-3" style="background:var(--bg-secondary);"><i class="bi bi-check-circle text-primary d-block" style="font-size:1.3rem;"></i><strong>${capitalize(p.status)}</strong></div></div>
                                </div>
                                <hr>
                                <p class="text-muted">${escHtml(p.description || 'No description provided.').replace(/\\n/g,'<br>')}</p>
                                <hr>
                                <div class="d-flex align-items-center gap-3 mb-3">
                                    <div class="user-avatar">${(owner.name || 'O').charAt(0).toUpperCase()}</div>
                                    <div><strong>${escHtml(owner.name || 'Owner')}</strong><br><small class="text-muted">Property Owner</small></div>
                                </div>
                                <div class="d-grid gap-2">
                                    <a href="https://wa.me/${p.phone}?text=${encodeURIComponent("Hi, I'm interested in: " + p.title + " (" + formatPrice(p.price) + "/month)")}" target="_blank" class="btn btn-whatsapp py-2"><i class="bi bi-whatsapp"></i> Contact on WhatsApp</a>
                                    ${user && owner.id ? `<a href="messages.html?user_id=${owner.id}&property_id=${p.id}" class="btn btn-outline-primary py-2"><i class="bi bi-chat-dots"></i> Send Message</a>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>`;
            }
        });
    </script>
</body>
</html>
