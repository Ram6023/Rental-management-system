<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <section class="dashboard-section">
            <div class="container">
                <h1 class="mb-4" style="font-family:var(--font-display);font-weight:800;font-size:1.8rem;"><i class="bi bi-heart text-danger"></i> My Wishlist</h1>
                <div class="row g-4" id="wishlistGrid"><div class="loading-spinner"><div class="spinner-border" role="status"></div></div></div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        initPage({
            auth: true,
            onReady: async () => {
                const user = await getUser();
                const { data: wl } = await sb.from('wishlist').select('property_id').eq('user_id', user.id);
                const container = document.getElementById('wishlistGrid');

                if (!wl?.length) {
                    container.innerHTML = '<div class="empty-state"><i class="bi bi-heart"></i><h4>Your Wishlist is Empty</h4><p>Save properties you like and compare them later</p><a href="properties.html" class="btn btn-primary mt-2"><i class="bi bi-buildings"></i> Browse Properties</a></div>';
                    return;
                }

                const propIds = wl.map(w => w.property_id);
                const { data: properties } = await sb.from('properties').select('*, profiles!properties_owner_id_fkey(name)').in('id', propIds);

                if (!properties?.length) {
                    container.innerHTML = '<div class="empty-state"><i class="bi bi-heart"></i><h4>Your Wishlist is Empty</h4></div>';
                    return;
                }

                container.innerHTML = properties.map(p =>
                    renderPropertyCard(p, p.profiles?.name || '', true, true)
                ).join('');
            }
        });
    </script>
</body>
</html>
