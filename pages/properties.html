<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Properties | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <section class="dashboard-section">
            <div class="container">
                <h1 class="mb-4" style="font-family:var(--font-display);font-weight:800;font-size:1.8rem;">
                    <i class="bi bi-building text-primary"></i> Browse Properties
                </h1>
                <div class="chart-card mb-4">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label small">Location</label>
                            <input type="text" class="form-control" id="searchLocation" placeholder="e.g. Hyderabad">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small">Max Budget</label>
                            <input type="number" class="form-control" id="searchBudget" placeholder="₹50,000">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small">BHK</label>
                            <select class="form-select" id="searchBHK">
                                <option value="">All</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-primary w-100" onclick="searchProperties()"><i class="bi bi-search"></i> Search</button>
                        </div>
                    </div>
                </div>
                <div class="row g-4" id="allProperties"><div class="loading-spinner"><div class="spinner-border" role="status"></div></div></div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        initPage({ onReady: () => loadProperties('allProperties') });
    </script>
</body>
</html>
