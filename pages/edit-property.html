<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Property | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <section class="dashboard-section">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="page-header mb-4">
                            <nav aria-label="breadcrumb"><ol class="breadcrumb mb-1"><li class="breadcrumb-item"><a href="my-properties.html" class="text-primary text-decoration-none">My Properties</a></li><li class="breadcrumb-item active">Edit</li></ol></nav>
                            <h1><i class="bi bi-pencil-square"></i> Edit Property</h1>
                        </div>
                        <div class="auth-card" style="max-width:100%;">
                            <div id="editAlert"></div>
                            <form id="editPropertyForm">
                                <div class="row g-3" id="editFormFields"><div class="col-12 text-center py-4"><div class="spinner-border"></div></div></div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        let currentProperty = null;

        initPage({
            auth: true, role: 'owner',
            onReady: async (profile) => {
                const id = getUrlParam('id');
                if (!id) { window.location.href = 'my-properties.html'; return; }

                const user = await getUser();
                const { data: p } = await sb.from('properties').select('*').eq('id', id).single();
                if (!p || (p.owner_id !== user.id && profile.role !== 'admin')) { window.location.href = 'my-properties.html'; return; }
                currentProperty = p;

                const bhkOpts = [1,2,3,4,5].map(i => `<option value="${i}" ${p.bhk===i?'selected':''}>${i} BHK</option>`).join('');
                document.getElementById('editFormFields').innerHTML = `
                    <div class="col-12"><label class="form-label">Title</label><input type="text" class="form-control" id="title" value="${escHtml(p.title)}" required></div>
                    <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" id="description" rows="4">${escHtml(p.description)}</textarea></div>
                    <div class="col-md-6"><label class="form-label">Location</label><input type="text" class="form-control" id="location" value="${escHtml(p.location)}" required></div>
                    <div class="col-md-6"><label class="form-label">Monthly Rent (₹)</label><input type="number" class="form-control" id="price" value="${p.price}" required></div>
                    <div class="col-md-6"><label class="form-label">BHK</label><select class="form-select" id="bhk">${bhkOpts}</select></div>
                    <div class="col-md-6"><label class="form-label">Phone</label><input type="tel" class="form-control" id="phone" value="${escHtml(p.phone)}" required></div>
                    <div class="col-md-6"><label class="form-label">Status</label><select class="form-select" id="status"><option value="available" ${p.status==='available'?'selected':''}>Available</option><option value="rented" ${p.status==='rented'?'selected':''}>Rented</option><option value="maintenance" ${p.status==='maintenance'?'selected':''}>Maintenance</option></select></div>
                    <div class="col-md-6"><label class="form-label">Featured?</label><select class="form-select" id="is_featured"><option value="false" ${!p.is_featured?'selected':''}>No</option><option value="true" ${p.is_featured?'selected':''}>Yes</option></select></div>
                    <div class="col-12">
                        <label class="form-label">Property Image</label>
                        ${p.image_url ? `<div class="mb-2"><img src="${p.image_url}" class="rounded" style="max-height:150px;object-fit:cover;"><small class="d-block text-muted mt-1">Upload new to replace</small></div>` : ''}
                        <input type="file" class="form-control" id="imageFile" accept="image/*" onchange="previewImage(this,'editPreview')">
                        <img id="editPreview" class="mt-2 rounded" style="display:none;max-height:150px;">
                    </div>
                    <div class="col-12"><button type="submit" class="btn btn-primary w-100 py-2" id="editBtn"><i class="bi bi-check-circle"></i> Update Property</button></div>`;

                document.getElementById('editPropertyForm').addEventListener('submit', async e => {
                    e.preventDefault();
                    const btn = document.getElementById('editBtn');
                    const alert = document.getElementById('editAlert');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Updating...';

                    try {
                        let imageUrl = currentProperty.image_url || '';
                        const file = document.getElementById('imageFile').files[0];
                        if (file) imageUrl = await uploadPropertyImage(file);

                        const { error } = await sb.from('properties').update({
                            title: document.getElementById('title').value,
                            description: document.getElementById('description').value,
                            location: document.getElementById('location').value,
                            price: parseFloat(document.getElementById('price').value),
                            bhk: parseInt(document.getElementById('bhk').value),
                            phone: document.getElementById('phone').value,
                            status: document.getElementById('status').value,
                            is_featured: document.getElementById('is_featured').value === 'true',
                            image_url: imageUrl
                        }).eq('id', currentProperty.id);

                        if (error) throw error;
                        alert.innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle"></i> Property updated!</div>';
                        setTimeout(() => window.location.href = 'my-properties.html', 1500);
                    } catch (err) {
                        alert.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
                        btn.disabled = false;
                        btn.innerHTML = '<i class="bi bi-check-circle"></i> Update Property';
                    }
                });
            }
        });
    </script>
</body>
</html>
