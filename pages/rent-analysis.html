<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent AI Analysis | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <section class="dashboard-section">
            <div class="container">
                <div class="row mb-4 align-items-center">
                    <div class="col-md-6">
                        <h1 class="hero-title" style="font-size: 2.5rem; text-align: left; margin: 0;">
                            Rent <span class="highlight">AI Analysis</span>
                        </h1>
                        <p class="text-muted">Predictive market insights and future price forecasting</p>
                    </div>
                    <div class="col-md-6 text-md-end">
                        <div class="badge bg-primary-glow text-primary p-2 px-3 rounded-pill border border-primary border-opacity-25">
                            <i class="bi bi-cpu-fill"></i> Powered by RentEase AI
                        </div>
                    </div>
                </div>

                <div id="analysisContent">
                    <div class="loading-spinner"><div class="spinner-border" role="status"></div></div>
                </div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        initPage({
            onReady: async () => {
                const propertyId = getUrlParam('id');
                if (!propertyId) {
                    renderGeneralMarketAnalysis();
                    return;
                }
                renderPropertyAnalysis(propertyId);
            }
        });

        async function renderPropertyAnalysis(id) {
            const container = document.getElementById('analysisContent');
            const { data: p, error } = await sb.from('properties').select('*').eq('id', id).single();
            
            if (error || !p) {
                container.innerHTML = `<div class="alert alert-danger">Property not found for analysis.</div>`;
                return;
            }

            // Mocked Calculation Logic for "Prediction"
            const currentRent = parseFloat(p.price);
            const anualGrowth = 0.07; // 7% annual growth
            const years = [2024, 2025, 2026, 2027, 2028];
            const predictions = years.map((y, i) => Math.round(currentRent * Math.pow(1 + anualGrowth, i)));

            container.innerHTML = `
                <div class="row g-4">
                    <div class="col-lg-4">
                        <div class="chart-card h-100">
                            <img src="${p.image_url || 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=400&h=300&fit=crop'}" class="w-100 rounded-3 mb-3" style="height:150px;object-fit:cover;">
                            <h4>${escHtml(p.title)}</h4>
                            <p class="text-muted small"><i class="bi bi-geo-alt"></i> ${escHtml(p.location)}</p>
                            <hr>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Current Rent:</span>
                                <span class="fw-bold text-primary">${formatPrice(p.price)}</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Predicted (2028):</span>
                                <span class="fw-bold text-success">${formatPrice(predictions[4])}</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Total Return (5y):</span>
                                <span class="badge bg-success bg-opacity-10 text-success">+${Math.round((predictions[4]/currentRent - 1)*100)}%</span>
                            </div>
                            <hr>
                            <h6>Market Sentiment</h6>
                            <div class="progress mb-2" style="height: 8px;">
                                <div class="progress-bar bg-success" role="progressbar" style="width: 85%"></div>
                            </div>
                            <small class="text-muted">High demand in this area (85%)</small>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="chart-card">
                            <h5>5-Year Price Forecast</h5>
                            <canvas id="forecastChart" height="300"></canvas>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="chart-card">
                            <h5><i class="bi bi-lightbulb text-warning"></i> Investment Insight</h5>
                            <p>Based on current trends in <strong>${p.location.split(',')[0]}</strong>, the rental yields are expected to outpace local inflation. 
                            The proximity to business hubs makes this a low-risk investment.</p>
                            <ul>
                                <li>Estimated ROI: 9.2% annually</li>
                                <li>Risk Level: Low</li>
                                <li>Liquidity: High</li>
                            </ul>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="chart-card">
                            <h5><i class="bi bi-graph-up-arrow text-primary"></i> Market Index Comparison</h5>
                            <canvas id="comparisonChart" height="200"></canvas>
                        </div>
                    </div>
                </div>
            `;

            // Forecast Chart
            new Chart(document.getElementById('forecastChart'), {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [{
                        label: 'Predicted Rent',
                        data: predictions,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#6366f1',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: false,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { callback: value => '₹' + value.toLocaleString('en-IN') }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Comparison Chart
            new Chart(document.getElementById('comparisonChart'), {
                type: 'bar',
                data: {
                    labels: ['This Property', 'Area Avg', 'City Avg'],
                    datasets: [{
                        data: [currentRent, currentRent * 0.9, currentRent * 0.75],
                        backgroundColor: ['#6366f1', '#818cf8', '#a5b4fc'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        async function renderGeneralMarketAnalysis() {
            const container = document.getElementById('analysisContent');
            container.innerHTML = `
                <div class="empty-state text-center py-5">
                    <i class="bi bi-search" style="font-size: 3rem;"></i>
                    <h4>Global Market Analysis</h4>
                    <p>Select a property to see specific AI-driven price forecasts.</p>
                    <a href="properties.html" class="btn btn-primary">Browse Properties</a>
                </div>
            `;
        }
    </script>
</body>
</html>
