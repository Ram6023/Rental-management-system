<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <section class="dashboard-section">
            <div class="container">
                <h1 class="mb-4" style="font-family:var(--font-display);font-weight:800;font-size:1.8rem;"><i class="bi bi-chat-dots text-primary"></i> Messages</h1>
                <div class="row g-4">
                    <!-- Conversations -->
                    <div class="col-lg-4">
                        <div class="chart-card p-0" style="max-height:calc(100vh - 200px);overflow-y:auto;">
                            <div class="p-3 border-bottom" style="background:var(--bg-secondary);"><h6 class="mb-0 fw-bold"><i class="bi bi-people"></i> Conversations</h6></div>
                            <div id="conversationList" class="list-group list-group-flush">
                                <div class="p-4 text-center"><div class="spinner-border spinner-border-sm"></div></div>
                            </div>
                        </div>
                    </div>
                    <!-- Chat -->
                    <div class="col-lg-8">
                        <div class="messages-container" id="chatWindow">
                            <div class="empty-state"><i class="bi bi-chat-square-text"></i><h4>Select a Conversation</h4><p>Choose from the left to start chatting</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        let chatInterval = null;

        initPage({
            auth: true,
            onReady: async () => {
                const user = await getUser();
                const otherUserId = getUrlParam('user_id');
                const propertyId = getUrlParam('property_id') || '';

                // Load conversations
                const { data: allMsgs } = await sb.from('messages').select('sender_id,receiver_id,message,created_at')
                    .or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`)
                    .order('created_at', { ascending: false });

                const seen = {};
                const convos = [];
                (allMsgs || []).forEach(m => {
                    const otherId = m.sender_id === user.id ? m.receiver_id : m.sender_id;
                    if (!seen[otherId]) { seen[otherId] = true; convos.push({ otherId, lastMsg: m.message, lastTime: m.created_at }); }
                });

                // Fetch names
                const ids = convos.map(c => c.otherId);
                let nameMap = {};
                if (ids.length) {
                    const { data: users } = await sb.from('profiles').select('id,name,role').in('id', ids);
                    (users||[]).forEach(u => nameMap[u.id] = u);
                }

                const list = document.getElementById('conversationList');
                if (!convos.length) {
                    list.innerHTML = '<div class="p-4 text-center text-muted"><i class="bi bi-chat" style="font-size:2rem;opacity:0.3;"></i><p class="mt-2 mb-0 small">No conversations yet</p></div>';
                } else {
                    list.innerHTML = convos.map(c => {
                        const info = nameMap[c.otherId] || { name: 'Unknown', role: '' };
                        const active = otherUserId === c.otherId;
                        return `<a href="?user_id=${c.otherId}${propertyId ? '&property_id='+propertyId : ''}" class="list-group-item list-group-item-action border-0 px-3 py-3 ${active ? 'active' : ''}" style="${active ? 'background:var(--primary-glow);' : ''}">
                            <div class="d-flex align-items-center gap-3">
                                <div class="user-avatar" style="width:40px;height:40px;flex-shrink:0;">${info.name.charAt(0).toUpperCase()}</div>
                                <div class="flex-grow-1 min-w-0">
                                    <div class="d-flex justify-content-between"><strong class="small">${escHtml(info.name)}</strong><small class="text-muted">${new Date(c.lastTime).toLocaleDateString('en-IN',{month:'short',day:'numeric'})}</small></div>
                                    <small class="text-muted text-truncate d-block">${escHtml(c.lastMsg.substring(0,40))}...</small>
                                </div>
                            </div></a>`;
                    }).join('');
                }

                // Open chat if user_id param
                if (otherUserId) {
                    const otherUser = nameMap[otherUserId] || (await getProfile(otherUserId)) || { name: 'User', role: '' };
                    document.getElementById('chatWindow').innerHTML = `
                        <div class="messages-header"><div class="d-flex align-items-center gap-3"><div class="user-avatar">${(otherUser.name||'U').charAt(0).toUpperCase()}</div><div><strong>${escHtml(otherUser.name)}</strong><br><small class="text-muted">${capitalize(otherUser.role)}</small></div></div></div>
                        <div class="messages-body" id="messagesBody"><div class="loading-spinner"><div class="spinner-border" role="status"></div></div></div>
                        <div class="messages-footer"><div class="input-group"><input type="text" class="form-control" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage('${otherUserId}',${propertyId||'null'})"><button class="btn btn-primary px-4" onclick="sendMessage('${otherUserId}',${propertyId||'null'})"><i class="bi bi-send"></i></button></div></div>`;
                    loadMessages(otherUserId);
                    chatInterval = setInterval(() => loadMessages(otherUserId), 5000);
                }
            }
        });
    </script>
</body>
</html>
