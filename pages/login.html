<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <section class="auth-section">
            <div class="container">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-icon"><i class="bi bi-box-arrow-in-right"></i></div>
                        <h2>Welcome Back</h2>
                        <p>Sign in to your RentEase account</p>
                    </div>
                    <div id="loginAlert"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2" id="loginBtn">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                    </form>
                    <div class="auth-divider">or</div>
                    <div class="text-center">
                        <p class="mb-2 small text-muted">Don't have an account?</p>
                        <a href="register.html" class="btn btn-outline-primary w-100"><i class="bi bi-person-plus"></i> Create Account</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        initPage({
            onReady: async () => {
                await redirectIfLoggedIn();

                document.getElementById('loginForm').addEventListener('submit', async e => {
                    e.preventDefault();
                    const btn = document.getElementById('loginBtn');
                    const alert = document.getElementById('loginAlert');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';

                    try {
                        const email = document.getElementById('email').value;
                        const password = document.getElementById('password').value;
                        await signIn(email, password);
                        const profile = await getProfile();
                        alert.innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle"></i> Login successful!</div>';
                        setTimeout(() => redirectByRole(profile?.role), 600);
                    } catch (err) {
                        alert.innerHTML = `<div class="alert alert-danger"><i class="bi bi-exclamation-circle"></i> ${err.message}</div>`;
                        btn.disabled = false;
                        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
                    }
                });
            }
        });
    </script>
</body>
</html>
