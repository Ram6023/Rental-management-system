<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | RentEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <main class="main-content">
        <!-- Hero Search -->
        <section class="hero-section">
            <div class="hero-bg-shapes"><div class="shape shape-1"></div><div class="shape shape-2"></div><div class="shape shape-3"></div></div>
            <div class="container position-relative" style="z-index:2;">
                <div class="hero-content text-center">
                    <div class="hero-badge"><span class="badge-dot"></span> Smart Property Search</div>
                    <h1 class="hero-title">Find Your Perfect<br><span class="highlight">Rental Home</span></h1>
                    <p class="hero-subtitle mx-auto">Browse verified properties. Filter by location, budget, and room type.</p>
                    <div class="search-wrapper mx-auto" style="max-width:800px;">
                        <div class="search-bar">
                            <div class="row g-2 align-items-end">
                                <div class="col-md-4">
                                    <label class="form-label text-start d-block small">Location</label>
                                    <input type="text" class="form-control" id="searchLocation" placeholder="e.g. Hyderabad">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label text-start d-block small">Max Budget</label>
                                    <input type="number" class="form-control" id="searchBudget" placeholder="₹50,000">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label text-start d-block small">BHK</label>
                                    <select class="form-select" id="searchBHK">
                                        <option value="">All</option>
                                        <option value="1">1 BHK</option>
                                        <option value="2">2 BHK</option>
                                        <option value="3">3 BHK</option>
                                        <option value="4">4 BHK</option>
                                        <option value="5">5 BHK</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-primary w-100" onclick="searchProperties()"><i class="bi bi-search"></i> Search</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Featured -->
        <section class="container py-5">
            <div class="section-header">
                <h2 class="section-title"><i class="bi bi-star-fill text-warning"></i> Featured Properties</h2>
                <p class="section-subtitle">Hand-picked premium rental properties</p>
            </div>
            <div class="row g-4" id="featuredProperties"><div class="loading-spinner"><div class="spinner-border" role="status"></div></div></div>
        </section>

        <!-- All -->
        <section class="container pb-5">
            <div class="section-header">
                <h2 class="section-title"><i class="bi bi-buildings"></i> All Properties</h2>
                <p class="section-subtitle">Browse our complete catalog</p>
            </div>
            <div class="row g-4" id="allProperties"><div class="loading-spinner"><div class="spinner-border" role="status"></div></div></div>
        </section>
    </main>
    <footer id="footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        initPage({
            auth: true,
            onReady: async (profile) => {
                if (profile?.role === 'owner') { window.location.href = 'owner-dashboard.html'; return; }
                loadProperties('featuredProperties', { featured: true }, 6);
                loadProperties('allProperties');
            }
        });
    </script>
</body>
</html>
